server.port=8080
debug=false
logging.level.root=INFO
logging.level.org.springframework=INFO
hackerprank.cors.allowed-origins=${HACKERPRANK_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
spring.datasource.url=${HACKERPRANK_DATABASE_URL:jdbc:postgresql://localhost:5432/hackerprank}
spring.datasource.username=${HACKERPRANK_DATABASE_USERNAME:hackerprank}
spring.datasource.password=${HACKERPRANK_DATABASE_PASSWORD:hackerprank}
spring.datasource.hikari.maximum-pool-size=${HACKERPRANK_DATABASE_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HACKERPRANK_DATABASE_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HACKERPRANK_DATABASE_CONNECTION_TIMEOUT_MS:2000}
spring.datasource.hikari.validation-timeout=${HACKERPRANK_DATABASE_VALIDATION_TIMEOUT_MS:1000}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
hackerprank.generator.provider=${HACKERPRANK_GENERATOR_PROVIDER:deterministic}
hackerprank.openai.api-key=${OPENAI_API_KEY:}
hackerprank.openai.model=${HACKERPRANK_OPENAI_MODEL:gpt-5-mini}
hackerprank.openai.responses-url=${HACKERPRANK_OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
hackerprank.openai.timeout-seconds=${HACKERPRANK_OPENAI_TIMEOUT_SECONDS:45}
hackerprank.openai.max-output-tokens=${HACKERPRANK_OPENAI_MAX_OUTPUT_TOKENS:6000}
hackerprank.openai.prompt-version=${HACKERPRANK_OPENAI_PROMPT_VERSION:openai-problem-v1}
hackerprank.anthropic.api-key=${ANTHROPIC_API_KEY:}
hackerprank.anthropic.model=${HACKERPRANK_ANTHROPIC_MODEL:claude-sonnet-4-6}
hackerprank.anthropic.messages-url=${HACKERPRANK_ANTHROPIC_MESSAGES_URL:https://api.anthropic.com/v1/messages}
hackerprank.anthropic.version=${HACKERPRANK_ANTHROPIC_VERSION:2023-06-01}
hackerprank.anthropic.timeout-seconds=${HACKERPRANK_ANTHROPIC_TIMEOUT_SECONDS:45}
hackerprank.anthropic.max-output-tokens=${HACKERPRANK_ANTHROPIC_MAX_OUTPUT_TOKENS:6000}
hackerprank.anthropic.prompt-version=${HACKERPRANK_ANTHROPIC_PROMPT_VERSION:anthropic-problem-v1}
hackerprank.tutor.provider=${HACKERPRANK_TUTOR_PROVIDER:deterministic}
hackerprank.tutor.openai.api-key=${OPENAI_API_KEY:}
hackerprank.tutor.openai.model=${HACKERPRANK_TUTOR_OPENAI_MODEL:gpt-5-mini}
hackerprank.tutor.openai.responses-url=${HACKERPRANK_TUTOR_OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
hackerprank.tutor.openai.timeout-seconds=${HACKERPRANK_TUTOR_OPENAI_TIMEOUT_SECONDS:30}
hackerprank.tutor.openai.max-output-tokens=${HACKERPRANK_TUTOR_OPENAI_MAX_OUTPUT_TOKENS:900}
hackerprank.tutor.openai.prompt-version=${HACKERPRANK_TUTOR_OPENAI_PROMPT_VERSION:openai-tutor-v1}
hackerprank.tutor.anthropic.api-key=${ANTHROPIC_API_KEY:}
hackerprank.tutor.anthropic.model=${HACKERPRANK_TUTOR_ANTHROPIC_MODEL:claude-sonnet-4-6}
hackerprank.tutor.anthropic.messages-url=${HACKERPRANK_TUTOR_ANTHROPIC_MESSAGES_URL:https://api.anthropic.com/v1/messages}
hackerprank.tutor.anthropic.version=${HACKERPRANK_TUTOR_ANTHROPIC_VERSION:2023-06-01}
hackerprank.tutor.anthropic.timeout-seconds=${HACKERPRANK_TUTOR_ANTHROPIC_TIMEOUT_SECONDS:30}
hackerprank.tutor.anthropic.max-output-tokens=${HACKERPRANK_TUTOR_ANTHROPIC_MAX_OUTPUT_TOKENS:900}
hackerprank.tutor.anthropic.prompt-version=${HACKERPRANK_TUTOR_ANTHROPIC_PROMPT_VERSION:anthropic-tutor-v1}
hackerprank.runner.mode=docker
hackerprank.runner.workspace-root=.hackerprank-submissions
hackerprank.runner.docker.python-image=python:3.12-alpine
hackerprank.runner.docker.java-image=eclipse-temurin:21-jdk-alpine
hackerprank.runner.docker.cpus=1
hackerprank.runner.docker.memory=256m
hackerprank.runner.docker.pids-limit=128
