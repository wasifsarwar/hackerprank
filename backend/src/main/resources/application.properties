server.port=8080
debug=false
logging.level.root=INFO
logging.level.org.springframework=INFO
spring.datasource.url=${HACKERPRANK_DATABASE_URL:jdbc:postgresql://localhost:5432/hackerprank}
spring.datasource.username=${HACKERPRANK_DATABASE_USERNAME:hackerprank}
spring.datasource.password=${HACKERPRANK_DATABASE_PASSWORD:hackerprank}
spring.datasource.hikari.maximum-pool-size=${HACKERPRANK_DATABASE_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HACKERPRANK_DATABASE_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HACKERPRANK_DATABASE_CONNECTION_TIMEOUT_MS:2000}
spring.datasource.hikari.validation-timeout=${HACKERPRANK_DATABASE_VALIDATION_TIMEOUT_MS:1000}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
hackerprank.runner.mode=docker
hackerprank.runner.workspace-root=.hackerprank-submissions
hackerprank.runner.docker.python-image=python:3.12-alpine
hackerprank.runner.docker.java-image=eclipse-temurin:21-jdk-alpine
hackerprank.runner.docker.cpus=1
hackerprank.runner.docker.memory=256m
hackerprank.runner.docker.pids-limit=128
