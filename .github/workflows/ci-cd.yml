name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test
        working-directory: backend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  compose-smoke:
    name: Container smoke test
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build postgres backend frontend

      - name: Smoke test HTTP endpoints
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/api/problems >/dev/null \
              && curl -fsS http://127.0.0.1:5173/api/problems >/dev/null \
              && curl -fsS http://127.0.0.1:5173/ >/dev/null; then
              exit 0
            fi

            sleep 2
          done

          docker compose logs
          exit 1

      - name: Stop stack
        if: always()
        run: docker compose down -v

  publish-images:
    name: Publish images
    runs-on: ubuntu-latest
    needs:
      - compose-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - component: backend
            dockerfile: backend/Dockerfile
            image: ghcr.io/${{ github.repository }}/backend
          - component: frontend
            dockerfile: frontend/Dockerfile
            image: ghcr.io/${{ github.repository }}/frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
