services:
  postgres:
    image: postgres:16-alpine
    container_name: hackerprank-postgres
    environment:
      POSTGRES_DB: hackerprank
      POSTGRES_USER: hackerprank
      POSTGRES_PASSWORD: hackerprank
    ports:
      - "5432:5432"
    volumes:
      - hackerprank-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackerprank -d hackerprank"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hackerprank-postgres-data:

